<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Works – Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --ink: #0a0e14;
      --accent: #1a56db;
      --accent-light: #e0eaff;
      --card-bg: #ffffff;
      --border: #0a0e14;
      --muted: #4a5568;
    }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 48px 32px;
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      border: 2.5px solid var(--border);
      padding: 28px 40px;
      margin-bottom: 40px;
      background: var(--ink);
      color: #fff;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: 2.5px solid var(--accent);
      z-index: -1;
    }
    .back-link {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #7aa8e0;
      text-decoration: none;
      margin-bottom: 10px;
    }
    .back-link:hover { color: #5b9bff; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: -0.02em;
    }
    .works-list { display: flex; flex-direction: column; gap: 28px; }
    /* ============================================
       作品カード
       追加するときはこの <article> をコピーして貼り付けてください。
       ============================================ */
    .work-card {
      border: 2.5px solid var(--border);
      padding: 28px;
      background: var(--card-bg);
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: auto 1fr;
      gap: 12px 24px;
      position: relative;
      animation: fadeUp 0.5s ease both;
    }
    .work-card::before {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: 2.5px solid var(--accent);
      z-index: -1;
    }
    .work-thumb {
      grid-row: 1 / 3;
      border: 2px solid var(--border);
      overflow: hidden;
      aspect-ratio: 4 / 3;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .work-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .work-thumb .placeholder {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .work-title { align-self: end; }
    .work-title a {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 2px;
      transition: color 0.15s;
    }
    .work-title a:hover { color: var(--accent); }
    .work-desc {
      border: 2px solid var(--border);
      padding: 16px 18px;
      font-size: 0.87rem;
      line-height: 1.85;
      color: #2d3748;
      background: var(--accent-light);
    }
    .work-tags { grid-column: 2; display: flex; gap: 8px; flex-wrap: wrap; margin-top: -4px; }
    .tag {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 2px 9px;
    }
    footer { margin-top: 48px; text-align: center; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .work-card:nth-child(1) { animation-delay: 0.05s; }
    .work-card:nth-child(2) { animation-delay: 0.15s; }
    .work-card:nth-child(3) { animation-delay: 0.25s; }
    .work-card:nth-child(4) { animation-delay: 0.35s; }
    .work-card:nth-child(5) { animation-delay: 0.45s; }
    @media (max-width: 620px) {
      body { padding: 24px 16px; }
      .work-card { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; }
      .work-thumb { grid-row: auto; aspect-ratio: 16 / 9; }
      .work-tags  { grid-column: 1; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back-link" href="../index.html">← ホームへ戻る</a>
    <h1>School Works</h1>
  </header>
  <main class="works-list">

      </div>
      <div class="work-desc">

  </main>

</html>
