<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --ink: #0a0e14;
      --accent: #1a56db;
      --accent-light: #e0eaff;
      --card-bg: #ffffff;
      --border: #0a0e14;
      --muted: #4a5568;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 48px 32px;
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      border: 2.5px solid var(--border);
      padding: 36px 48px;
      margin-bottom: 40px;
      position: relative;
      background: var(--ink);
      color: #fff;
      animation: fadeUp 0.6s ease both;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: 2.5px solid var(--accent);
      z-index: -1;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    h1 span { color: #5b9bff; }
    .subtitle {
      margin-top: 8px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7aa8e0;
    }
    .bio {
      border: 2.5px solid var(--border);
      padding: 28px 40px;
      margin-bottom: 40px;
      background: var(--card-bg);
      position: relative;
      animation: fadeUp 0.6s 0.15s ease both;
    }
    .bio::before {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: 2.5px solid var(--accent);
      z-index: -1;
    }
    .bio p { font-size: 0.95rem; line-height: 1.9; color: #2d3748; }
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .works-wrapper {
      border: 2.5px solid var(--border);
      padding: 32px;
      background: var(--card-bg);
      position: relative;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .works-wrapper::before {
      content: '';
      position: absolute;
      inset: 5px -5px -5px 5px;
      border: 2.5px solid var(--accent);
      z-index: -1;
    }
    .works-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .category-card {
      border: 2.5px solid var(--border);
      padding: 28px 28px 32px;
      background: var(--accent-light);
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .category-card::after {
      content: '→';
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      position: absolute;
      bottom: 20px;
      right: 24px;
      transition: transform 0.18s ease;
    }
    .category-card:hover { transform: translate(-3px, -3px); box-shadow: 5px 5px 0 var(--accent); }
    .category-card:hover::after { transform: translateX(4px); }
    .card-tag {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 3px 10px;
      align-self: flex-start;
    }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.25rem; letter-spacing: -0.01em; }
    .card-desc { font-size: 0.85rem; line-height: 1.75; color: var(--muted); padding-bottom: 8px; }
    footer { margin-top: 48px; text-align: center; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 600px) {
      body { padding: 24px 16px; }
      .works-grid { grid-template-columns: 1fr; }
      header { padding: 24px 24px; }
      .bio { padding: 20px 24px; }
    }
  </style>
</head>
<body>
  <header>
    <p class="subtitle">Portfolio</p>
    <h1>Your <span>Name</span></h1>
  </header>
  <section class="bio">
    <p>
      ここに自己紹介を書いてください。<br>
      使用している技術、興味のある分野、制作への姿勢など、自由に記入できます。
    </p>
  </section>
  <div class="works-wrapper">
    <p class="section-label">Works</p>
    <div class="works-grid">
      <a class="category-card" href="personal/index.html">
        <span class="card-tag">Personal</span>
        <span class="card-title">個人制作</span>
        <p class="card-desc">個人で制作した作品をまとめています。<br>ゲーム・インタラクティブ作品など。</p>
      </a>
      <a class="category-card" href="school/index.html">
        <span class="card-tag">School</span>
        <span class="card-title">学校関係の制作</span>
        <p class="card-desc">授業や課題として制作した作品をまとめています。</p>
      </a>
    </div>
  </div>
  <footer><p>© 2026 Your Name</p></footer>
</body>
</html>
